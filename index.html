<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูอาหารร้านบ้านตั้ม&ตุ๋ย</title>
    <style>
        body { font-family: 'Kanit', sans-serif; background-color: #f8f9fa; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .menu-card { background: #fff; width: 100%; max-width: 900px; border-radius: 30px; box-shadow: 0 15px 40px rgba(0,0,0,0.1); padding: 40px; text-align: center; }
        
        /* โลโก้ร้านสี่เหลี่ยม (ไม่งอวงกลม) */
        .logo-box { margin-bottom: 30px; }
        .logo-box img { width: 180px; height: auto; border-radius: 0; border: 5px solid #fff; box-shadow: 0 5px 15px rgba(0,0,0,0.1); object-fit: contain; }
        
        /* ชื่อร้าน: บรรทัดเดียว ไม่ขึ้นบรรทัดใหม่ */
        .logo-box h1 { 
            margin-top: 15px; 
            color: #333; 
            font-size: 28px; 
            white-space: nowrap; /* บังคับบรรทัดเดียว */
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; text-align: left; }
        .food-item { background: #fdfdfd; padding: 20px; border-radius: 20px; border: 1px solid #eee; transition: 0.3s; }
        .food-item:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.05); }

        .food-name { font-size: 19px; font-weight: 700; color: #2d3436; display: block; margin-bottom: 12px; }
        .food-img { width: 100%; height: 220px; object-fit: cover; border-radius: 15px; margin-bottom: 12px; background-color: #eee; }
        .food-price { font-size: 22px; font-weight: 800; color: #e67e22; text-align: right; display: block; }

        @media (max-width: 700px) { 
            .menu-grid { grid-template-columns: 1fr; } 
            .logo-box h1 { font-size: 22px; white-space: normal; } /* มือถือให้ปรับตามความเหมาะสม */
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700;800&display=swap" rel="stylesheet">
</head>
<body>

    <div class="menu-card">
        <div class="logo-box">
            <img src="IMG_2551.png" alt="Logo">
            <h1>เมนูอาหารร้านบ้านตั้ม&ตุ๋ย</h1>
        </div>

        <div class="menu-grid">
            <div class="food-item">
                <span class="food-name">ปลากะพงทอดน้ำปลา ราคาตามน้ำหนัก</span>
                <img src="IMG_2550.jpeg" class="food-img">
                <span class="food-price">300.-/350.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">จ้อปู</span>
                <img src="IMG_2549.jpeg" class="food-img">
                <span class="food-price">140.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">หมึกผัดไข่เค็ม</span>
                <img src="IMG_2552.jpeg" class="food-img">
                <span class="food-price">180.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">ปลาทับทิมนึ่งมะนาว</span>
                <img src="IMG_2553.jpeg" class="food-img">
                <span class="food-price">280.-</span>
            </div>
        </div>
    </div>

</body>
</html>
