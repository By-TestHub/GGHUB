<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>เมนูอาหารร้านบ้านตั้ม&ตุ๋ย</title>
    <style>
        body {
            font-family: 'Kanit', sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .menu-card {
            background-color: #ffffff;
            width: 100%;
            max-width: 800px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 40px;
            text-align: center;
        }

        /* 1. โลโก้ร้านตรงกลางด้านบน */
        .logo-section {
            margin-bottom: 40px;
        }
        .logo-section img {
            width: 120px; /* ปรับขนาดโลโก้ตรงนี้ */
            height: auto;
            border-radius: 50%;
        }
        .logo-section h1 {
            margin: 10px 0 0 0;
            font-size: 28px;
            color: #d35400;
        }

        /* 2. ระบบคอลัมน์ซ้าย-ขวา */
        .menu-grid {
            display: grid;
            grid-template-columns: 1fr 1fr; /* แบ่ง 2 ฝั่งซ้ายขวา */
            gap: 30px;
            text-align: left;
        }

        .food-item {
            background-color: #fafafa;
            padding: 15px;
            border-radius: 15px;
            border: 1px solid #eee;
        }

        /* ชื่ออาหาร */
        .food-name {
            font-size: 20px;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            display: block;
        }

        /* รูปอาหาร */
        .food-img {
            width: 100%;
            height: 180px;
            object-fit: cover; /* ให้รูปพอดีกรอบไม่เบี้ยว */
            border-radius: 10px;
            margin-bottom: 10px;
            background-color: #ddd; /* สีสำรองถ้ารูปไม่ขึ้น */
        }

        /* ราคาข้างล่าง */
        .food-price {
            font-size: 22px;
            font-weight: bold;
            color: #e67e22;
            display: block;
            text-align: right;
        }

        @media (max-width: 600px) {
            .menu-grid {
                grid-template-columns: 1fr; /* มือถือให้โชว์แถวเดียว */
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

    <div class="menu-card">
        <div class="logo-section">
            <img src="https://via.placeholder.com/120" alt="Logo"> <h1>ร้านอาหารคุณพ่อ</h1>
        </div>

        <div class="menu-grid">
            
            <div class="food-item">
                <span class="food-name">ผัดกะเพราสูตรโบราณ</span>
                <img src="https://via.placeholder.com/300x180" class="food-img" alt="Food"> <span class="food-price">180.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">ต้มยำกุ้งแม่น้ำ</span>
                <img src="https://via.placeholder.com/300x180" class="food-img" alt="Food"> <span class="food-price">250.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">ข้าวผัดปู</span>
                <img src="https://via.placeholder.com/300x180" class="food-img" alt="Food">
                <span class="food-price">150.-</span>
            </div>

            <div class="food-item">
                <span class="food-name">ปลากะพงทอดน้ำปลา</span>
                <img src="https://via.placeholder.com/300x180" class="food-img" alt="Food">
                <span class="food-price">380.-</span>
            </div>

        </div>
    </div>

</body>
</html>
