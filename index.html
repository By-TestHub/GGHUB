<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GGHUB | PREMIUM SHOP</title>
    <style>
        body { background-color: #0d0d0d; color: #ffffff; font-family: sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .shop-card { background: #1a1a1a; padding: 35px; border-radius: 25px; border: 2px solid #ffd700; text-align: center; width: 320px; box-shadow: 0 0 25px rgba(255, 215, 0, 0.15); }
        .price-tag { font-size: 45px; font-weight: bold; color: #ffd700; margin: 20px 0; }
        .input-label { font-size: 13px; color: #888; margin-bottom: 10px; display: block; }
        input { width: 90%; padding: 15px; border-radius: 12px; border: 1px solid #333; background: #000; color: #fff; margin-bottom: 25px; text-align: center; font-size: 14px; outline: none; }
        input:focus { border-color: #ffd700; }
        .btn-send { background-color: #0084ff; color: #fff; border: none; padding: 16px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s; box-shadow: 0 4px 15px rgba(0, 132, 255, 0.3); }
        .btn-send:hover { background-color: #0073e6; transform: translateY(-2px); }
    </style>
</head>
<body>

    <div class="shop-card">
        <h1 style="font-size: 24px; color: #ffd700; margin-bottom: 5px;">PREMIUM KEY</h1>
        <p style="font-size: 12px; color: #bbb;">ซื้อคีย์ถาวรเพื่อใช้งานตลอดชีพ</p>
        
        <div class="price-tag">50 THB</div>

        <span class="input-label">วางลิงก์ซองอั่งเปา (50 บาท)</span>
        <input type="text" id="gift-link" placeholder="https://gift.truemoney.com/...">

        <button class="btn-send" onclick="sendToFacebook()">💬 ส่งข้อมูลไปที่แชทแอดมิน</button>
        
        <p style="font-size: 11px; color: #555; margin-top: 20px;">เมื่อกดส่ง ระบบจะพาไปที่ Messenger <br>โปรดกดส่งข้อความในแอปเพื่อแจ้งแอดมิน</p>
    </div>

    <script>
        function sendToFacebook() {
            const link = document.getElementById('gift-link').value;
            
            // ตรวจสอบว่าใส่ลิงก์หรือยัง
            if (!link.includes("gift.truemoney.com")) {
                alert("❌ กรุณาวางลิงก์ซองอั่งเปาให้ถูกต้องก่อนกดส่งครับ!");
                return;
            }

            // แจ้งเตือนก่อนเด้ง
            alert("กำลังพาท่านไปที่แชทแอดมิน กะเพรา...");

            // เชื่อมเข้า Messenger ของลูกพี่โดยตรง
            const facebookName = "ka.pao.886028"; 
            const message = encodeURIComponent("ส่งซองอั่งเปาสำหรับคีย์ถาวรครับ: " + link);
            
            // ลิงก์ Deep Link สำหรับเปิด Messenger
            window.location.href = "https://m.me/" + facebookName + "?text=" + message;
        }
    </script>

</body>
</html>
